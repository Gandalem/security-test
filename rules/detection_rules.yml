rules:
  BRUTE_FORCE:
    severity: HIGH
    attack_category: credential_access
    threshold: 5
    window_minutes: 5
    detection_reason: "5분 이내 동일 IP에서 SSH 로그인 실패가 5회 이상 발생"
    recommendation: "해당 IP 차단, 계정 잠금 정책 확인, SSH 접근 허용 IP 제한을 검토하세요."
    mitre_tactic: "Credential Access"
    mitre_technique: "Brute Force"
  ADMIN_PAGE_SCAN:
    severity: MEDIUM
    attack_category: reconnaissance
    patterns:
      - /admin
      - /wp-login.php
      - /manager
      - /phpmyadmin
    detection_reason: "관리자 또는 로그인 페이지로 의심되는 경로에 접근"
    recommendation: "관리자 페이지 접근 로그를 확인하고, 관리자 페이지 접근 IP 제한을 검토하세요."
  SQL_INJECTION:
    severity: HIGH
    attack_category: web_attack
    patterns:
      - "' or '1'='1"
      - "or 1=1"
      - "union select"
      - "information_schema"
      - "sleep("
    detection_reason: "URL 파라미터에 SQL Injection 의심 패턴 포함"
    recommendation: "입력값 검증, Prepared Statement 적용, WAF 룰 적용 여부를 확인하세요."
  XSS_ATTACK:
    severity: HIGH
    attack_category: web_attack
    patterns:
      - "<script"
      - "alert("
      - "onerror="
      - "javascript:"
    detection_reason: "요청 값에 XSS 의심 스크립트 패턴 포함"
    recommendation: "출력 인코딩, 입력값 필터링, CSP 적용 여부를 확인하세요."
  PATH_TRAVERSAL:
    severity: HIGH
    attack_category: web_attack
    patterns:
      - "../"
      - "..%2f"
      - "/etc/passwd"
      - "win.ini"
    detection_reason: "경로 탐색 공격 의심 문자열 포함"
    recommendation: "파일 경로 입력값 검증과 디렉터리 접근 제한 설정을 확인하세요."
  SUSPICIOUS_STATUS_SCAN:
    severity: MEDIUM
    attack_category: reconnaissance
    threshold: 4
    window_minutes: 3
    status_codes:
      - 401
      - 403
      - 404
    detection_reason: "동일 IP에서 실패 응답이 반복되어 스캔 행위가 의심됨"
    recommendation: "해당 IP의 요청 경로와 User-Agent를 확인하고 차단 여부를 검토하세요."
  SSH_SUCCESS_AFTER_FAILURE:
    severity: MEDIUM
    attack_category: credential_access
    threshold: 3
    window_minutes: 10
    detection_reason: "동일 IP에서 여러 차례 로그인 실패 후 성공 로그인이 발생"
    recommendation: "계정 탈취 가능성을 확인하고, MFA 적용 여부와 로그인 이력을 검토하세요."
    mitre_tactic: "Credential Access"
    mitre_technique: "Valid Accounts"
  APP_ERROR_SPIKE:
    severity: MEDIUM
    attack_category: service_instability
    threshold: 3
    window_minutes: 5
    detection_reason: "짧은 시간 내 애플리케이션 ERROR 로그가 반복적으로 발생"
    recommendation: "애플리케이션 에러 원인과 연관 인프라 상태를 점검하세요."
